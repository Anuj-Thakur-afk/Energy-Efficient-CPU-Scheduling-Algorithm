<!DOCTYPE html>
<html>
<head>
<title>Student Record Manager</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:30px;
}

.container{
background:white;
padding:20px;
border-radius:8px;
width:700px;
margin:auto;
box-shadow:0 0 8px gray;
}

h2{
margin-bottom:20px;
}

input{
padding:8px;
margin-right:10px;
border:1px solid #ccc;
border-radius:4px;
}

button{
padding:8px 12px;
background:#2369ff;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#a1c0ff;
}

.section{
background:#e5e5e5;
padding:10px;
margin-top:10px;
border-radius:5px;
}

</style>
</head>

<body>

<div class="container">

<h2>Student Record Manager</h2>

<input type="text" id="name" placeholder="Student Name">
<input type="text" id="roll" placeholder="Roll Number">
<input type="number" id="marks" placeholder="Marks">

<button onclick="addStudent()">Add Student</button>

<input type="text" id="searchRoll" placeholder="Search by Roll">

<button onclick="searchStudent()">Search</button>

<div class="section" id="studentList">
No students added.
</div>

<div class="section" id="summary">
Summary will appear here.
</div>

<div class="section" id="searchResult">
Search result will appear here.
</div>

</div>

<script>

let students=[];

function addStudent(){

let name=document.getElementById("name").value;
let roll=document.getElementById("roll").value;
let marks=document.getElementById("marks").value;

if(name=="" || roll=="" || marks==""){
alert("Please fill all fields");
return;
}

alert("Form submitted successfully");

students.push({name,roll,marks});

displayStudents();
showSummary();

}

function displayStudents(){

let output="";

students.forEach(s=>{
output+=`<p>${s.name} | Roll: ${s.roll} | Marks: ${s.marks}</p>`;
});

document.getElementById("studentList").innerHTML=output;

}

function showSummary(){

let total=0;

students.forEach(s=>{
total+=Number(s.marks);
});

let avg=total/students.length;

document.getElementById("summary").innerHTML=
"Total Students: "+students.length+
"<br>Average Marks: "+avg;

}

function searchStudent(){

let roll=document.getElementById("searchRoll").value;

let found=students.find(s=>s.roll==roll);

if(found){

document.getElementById("searchResult").innerHTML=
`Found: ${found.name} | Marks: ${found.marks}`;

}else{

document.getElementById("searchResult").innerHTML=
"Student not found";

}

}

</script>

</body>
</html>
